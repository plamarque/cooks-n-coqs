name: E2E tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      VITE_BFF_URL: http://localhost:8787
      CORS_ORIGIN: http://localhost:4174
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Build BFF
        run: npm run build:bff

      - name: Run E2E tests
        run: |
          npm run start -w @cookies-et-coquilettes/bff &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8787/health && break
            sleep 1
            [ $i -eq 30 ] && exit 1
          done
          npm run test:e2e
